name: Lint Bash Scripts

on:
  push:
    paths:
      - '**/*.sh'
  pull_request:
    paths:
      - '**/*.sh'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install shellcheck and shfmt
        run: |
          sudo apt-get update -y
          sudo apt-get install -y shellcheck shfmt
      - name: Run shellcheck
        run: |
          shellcheck -x -e SC2034 -e SC1091 **/*.sh
      - name: Run shfmt
        run: |
          shfmt -d -i 2 -ci **/*.sh
